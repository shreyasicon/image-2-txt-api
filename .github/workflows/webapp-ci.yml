name: Webapp CI

on:
  push:
    branches: [main, master]
    paths:
      - 'webapp/scalable/**'
      - '.github/workflows/webapp-ci.yml'
  pull_request:
    branches: [main, master]
    paths:
      - 'webapp/scalable/**'
      - '.github/workflows/webapp-ci.yml'

defaults:
  run:
    working-directory: webapp/scalable

jobs:
  build-and-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_OCR_API_BASE: ${{ vars.NEXT_PUBLIC_OCR_API_BASE || 'https://xkdvpogqt0.execute-api.us-east-1.amazonaws.com/prod' }}
          NEXT_PUBLIC_TRANSLATE_API_BASE: ${{ vars.NEXT_PUBLIC_TRANSLATE_API_BASE || 'https://t3jb8c44xi.execute-api.us-east-1.amazonaws.com' }}

  sonarcloud:
    needs: build-and-lint
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: webapp/scalable
        run: npm ci

      - name: Build
        working-directory: webapp/scalable
        run: npm run build
        env:
          NEXT_PUBLIC_OCR_API_BASE: ${{ vars.NEXT_PUBLIC_OCR_API_BASE || 'https://xkdvpogqt0.execute-api.us-east-1.amazonaws.com/prod' }}
          NEXT_PUBLIC_TRANSLATE_API_BASE: ${{ vars.NEXT_PUBLIC_TRANSLATE_API_BASE || 'https://t3jb8c44xi.execute-api.us-east-1.amazonaws.com' }}

      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_KEY }}
        with:
          projectBaseDir: webapp/scalable
          args: >
            -Dsonar.organization=shreyasicon
            -Dsonar.projectKey=image-2-txt-api
