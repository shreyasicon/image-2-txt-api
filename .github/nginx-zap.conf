# ZAP CI static mirror: SPA routing + security headers.
# CSP: explicit hosts (no https: scheme wildcard). Update when API/Cognito regions change.
# Note: Next static export + inline bootstrap may still need script-src/style-src 'unsafe-inline'.

server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    location = /favicon.ico {
        default_type image/x-icon;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        return 204;
    }

    # robots.txt: align headers with HTML routes (ZAP: nosniff, CORP, CSP parity)
    location = /robots.txt {
        default_type text/plain;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cache-Control "public, max-age=3600" always;
        add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; frame-src 'none'; object-src 'none'; img-src 'self' data: blob: https://images.unsplash.com https://plus.unsplash.com https://*.unsplash.com https://*.amazonaws.com; font-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self' https://xkdvpogqt0.execute-api.us-east-1.amazonaws.com https://t3jb8c44xi.execute-api.us-east-1.amazonaws.com https://api.unsplash.com https://cognito-idp.us-east-1.amazonaws.com https://cognito-idp.eu-west-1.amazonaws.com https://cognito-idp.eu-west-2.amazonaws.com https://cognito-idp.eu-central-1.amazonaws.com https://vitals.vercel-insights.com https://*.amazonaws.com; upgrade-insecure-requests" always;
        return 200 "User-agent: *\nAllow: /\n";
    }

    # Long-cache immutable assets (matches Amplify pattern for _next/static)
    location ^~ /_next/static/ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    location / {
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        # No COEP: require-corp breaks Unsplash/third-party embeds; unsafe-none triggers ZAP noise.
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; frame-src 'none'; object-src 'none'; img-src 'self' data: blob: https://images.unsplash.com https://plus.unsplash.com https://*.unsplash.com https://*.amazonaws.com; font-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self' https://xkdvpogqt0.execute-api.us-east-1.amazonaws.com https://t3jb8c44xi.execute-api.us-east-1.amazonaws.com https://api.unsplash.com https://cognito-idp.us-east-1.amazonaws.com https://cognito-idp.eu-west-1.amazonaws.com https://cognito-idp.eu-west-2.amazonaws.com https://cognito-idp.eu-central-1.amazonaws.com https://vitals.vercel-insights.com https://*.amazonaws.com; upgrade-insecure-requests" always;
        try_files $uri $uri/ $uri/index.html /index.html;
    }
}
