# OWASP ZAP baseline overrides for the static-export mirror in CI.
# Required format: pluginId<TAB>ACTION<TAB>comment — at least THREE tab-separated fields per rule line
# (see load_config in https://github.com/zaproxy/zaproxy/blob/main/docker/zap_common.py)
#
# Registry: https://github.com/zaproxy/zaproxy/blob/main/docs/scanners.md

# 50003 — Stats passive scan rule (informational metrics, not vulns)
50003	IGNORE	(Stats passive scan rule)

# 10116 — “ZAP is out of date” (tooling noise in CI images)
10116	IGNORE	(ZAP out of date)

# 10109 — “Modern Web Application” (informational)
10109	IGNORE	(Modern web application)

# 100000 — httpsender script for HTTP error status codes on static mirror
100000	IGNORE	(HTTP error response code script)

# 10055 — CSP scanner flags script-src/style-src unsafe-inline. Next.js App Router static export
# injects inline RSC/hydration scripts; removing unsafe-inline breaks the app without nonce-based CSP
# on a dynamic origin. Inline style attributes and libraries (e.g. charts) need style-src unsafe-inline.
10055	IGNORE	(CSP unsafe-inline required for Next static export + inline styles; see nginx-zap.conf)

# 10049 — Informational cache heuristics (HTML no-store vs long-lived _next/static); intentional split.
10049	IGNORE	(Intentional cache policy: HTML no-store, static assets immutable)
