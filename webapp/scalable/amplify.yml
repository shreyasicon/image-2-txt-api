# Git-connected Amplify: set these in App settings → Environment variables:
#   NEXT_PUBLIC_COGNITO_USER_POOL_ID, NEXT_PUBLIC_COGNITO_CLIENT_ID, NEXT_PUBLIC_AWS_REGION
# Optional: NEXT_PUBLIC_OCR_API_BASE, NEXT_PUBLIC_TRANSLATE_API_BASE, NEXT_PUBLIC_UNSPLASH_ACCESS_KEY
version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: out
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
  customHeaders:
    # Cache static Next assets aggressively (performance)
    - pattern: "_next/static/**"
      headers:
        - key: "Cache-Control"
          value: "public, max-age=31536000, immutable"
    # Cache other static assets (images/fonts) for a week
    - pattern: "**/*.{png,jpg,jpeg,gif,webp,svg,ico,woff,woff2,ttf,eot}"
      headers:
        - key: "Cache-Control"
          value: "public, max-age=604800"
    # HTML: no cache + security headers (ZAP/Sonar hygiene)
    - pattern: "**/*.html"
      headers:
        - key: "Cache-Control"
          value: "no-cache, no-store, must-revalidate"
        - key: "X-Frame-Options"
          value: "SAMEORIGIN"
        - key: "X-Content-Type-Options"
          value: "nosniff"
        - key: "Referrer-Policy"
          value: "strict-origin-when-cross-origin"
        - key: "Permissions-Policy"
          value: "camera=(), microphone=(), geolocation=(), payment=()"
        - key: "Cross-Origin-Opener-Policy"
          value: "same-origin"
        - key: "Cross-Origin-Resource-Policy"
          value: "same-origin"
        - key: "Cross-Origin-Embedder-Policy"
          value: "unsafe-none"
        - key: "Content-Security-Policy"
          value: "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; img-src 'self' data: https: blob:; font-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; connect-src 'self' https:; upgrade-insecure-requests"
