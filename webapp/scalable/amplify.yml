# Git-connected Amplify: in the Amplify app, set "Monorepo" / App root to `webapp/scalable`
# so builds use this file and `npm run build` from that folder.
# App settings → Environment variables:
#   NEXT_PUBLIC_COGNITO_USER_POOL_ID, NEXT_PUBLIC_COGNITO_CLIENT_ID, NEXT_PUBLIC_AWS_REGION
# Optional: NEXT_PUBLIC_OCR_API_BASE, NEXT_PUBLIC_TRANSLATE_API_BASE, NEXT_PUBLIC_UNSPLASH_ACCESS_KEY
# If you change API hosts/regions, update Content-Security-Policy customHeaders below to match.
version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: out
    files:
      - "**/*"
  cache:
    paths:
      - node_modules/**/*
  customHeaders:
    # Cache static Next assets aggressively (performance)
    - pattern: "_next/static/**"
      headers:
        - key: "Cache-Control"
          value: "public, max-age=31536000, immutable"
        - key: "X-Content-Type-Options"
          value: "nosniff"
        - key: "Permissions-Policy"
          value: "camera=(), microphone=(), geolocation=(), payment=()"
        - key: "Cross-Origin-Resource-Policy"
          value: "same-origin"
    # Cache other static assets (images/fonts) for a week
    - pattern: "**/*.{png,jpg,jpeg,gif,webp,svg,ico,woff,woff2,ttf,eot}"
      headers:
        - key: "Cache-Control"
          value: "public, max-age=604800"
    # HTML: no cache + security headers (ZAP/Sonar hygiene)
    - pattern: "**/*.html"
      headers:
        - key: "Cache-Control"
          value: "no-cache, no-store, must-revalidate"
        - key: "X-Frame-Options"
          value: "SAMEORIGIN"
        - key: "X-Content-Type-Options"
          value: "nosniff"
        - key: "Referrer-Policy"
          value: "strict-origin-when-cross-origin"
        - key: "Permissions-Policy"
          value: "camera=(), microphone=(), geolocation=(), payment=()"
        - key: "Cross-Origin-Opener-Policy"
          value: "same-origin"
        - key: "Cross-Origin-Resource-Policy"
          value: "same-origin"
        - key: "Cross-Origin-Embedder-Policy"
          value: "credentialless"
        - key: "Content-Security-Policy"
          value: "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; frame-src 'none'; object-src 'none'; img-src 'self' data: blob: https://images.unsplash.com https://plus.unsplash.com https://*.unsplash.com https://*.amazonaws.com; font-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self' https://xkdvpogqt0.execute-api.us-east-1.amazonaws.com https://t3jb8c44xi.execute-api.us-east-1.amazonaws.com https://api.unsplash.com https://cognito-idp.us-east-1.amazonaws.com https://cognito-idp.eu-west-1.amazonaws.com https://cognito-idp.eu-west-2.amazonaws.com https://cognito-idp.eu-central-1.amazonaws.com https://vitals.vercel-insights.com https://*.amazonaws.com; upgrade-insecure-requests"
    - pattern: "robots.txt"
      headers:
        - key: "Cache-Control"
          value: "public, max-age=3600"
        - key: "X-Frame-Options"
          value: "SAMEORIGIN"
        - key: "X-Content-Type-Options"
          value: "nosniff"
        - key: "Referrer-Policy"
          value: "strict-origin-when-cross-origin"
        - key: "Permissions-Policy"
          value: "camera=(), microphone=(), geolocation=(), payment=()"
        - key: "Cross-Origin-Opener-Policy"
          value: "same-origin"
        - key: "Cross-Origin-Resource-Policy"
          value: "same-origin"
        - key: "Cross-Origin-Embedder-Policy"
          value: "credentialless"
        - key: "Content-Security-Policy"
          value: "default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; frame-src 'none'; object-src 'none'; img-src 'self' data: blob: https://images.unsplash.com https://plus.unsplash.com https://*.unsplash.com https://*.amazonaws.com; font-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self' https://xkdvpogqt0.execute-api.us-east-1.amazonaws.com https://t3jb8c44xi.execute-api.us-east-1.amazonaws.com https://api.unsplash.com https://cognito-idp.us-east-1.amazonaws.com https://cognito-idp.eu-west-1.amazonaws.com https://cognito-idp.eu-west-2.amazonaws.com https://cognito-idp.eu-central-1.amazonaws.com https://vitals.vercel-insights.com https://*.amazonaws.com; upgrade-insecure-requests"
