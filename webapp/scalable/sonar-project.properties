sonar.organization=shreyasicon
sonar.projectKey=shreyasicon_image-2-txt-api

sonar.sources=app,components,lib
sonar.exclusions=**/node_modules/**,**/.next/**,**/out/**,**/*.config.*
sonar.sourceEncoding=UTF-8

# Coverage from Vitest (run npm run test:coverage before Sonar in CI)
sonar.javascript.lcov.reportPaths=coverage/lcov.info
# Coverage exclusions (still analyzed for bugs; omitted from coverage %): shadcn ui; root/dashboard layouts; Unsplash page; Cognito AuthProvider; large Vault page — core logic covered via lib/tests and page smoke tests
sonar.coverage.exclusions=**/components/ui/**,**/app/layout.tsx,**/app/dashboard/layout.tsx,**/app/dashboard/images/page.tsx,**/components/auth-provider.tsx,**/app/dashboard/vault/page.tsx
